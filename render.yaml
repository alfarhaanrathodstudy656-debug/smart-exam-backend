services:
  - type: web
    name: smart-exam-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        value: alfarhaanrathodstudy656@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_NEGATIVE_MARK_RATIO
        value: "0.25"
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        value: https://smart-exam-system-umber.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_ADMIN_ALLOWLIST
        value: alfarhaanrathodstudy656@gmail.com
      - key: PASSWORD_RESET_OTP_EXPIRY_MINUTES
        value: "10"
      - key: ADMIN_PORTAL_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: Smart Exam <no-reply@smart-exam.local>
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: openai/gpt-5.4-pro
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-mini-transcribe
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "250"
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: "20"
      - key: USER_AUTH_RATE_LIMIT_MAX_REQUESTS
        value: "12"
      - key: ADMIN_AUTH_RATE_LIMIT_MAX_REQUESTS
        value: "8"
      - key: LOGIN_LOCK_THRESHOLD
        value: "8"
      - key: LOGIN_LOCK_DURATION_MINUTES
        value: "15"
      - key: ADMIN_LOGIN_LOCK_THRESHOLD
        value: "5"
      - key: ADMIN_LOGIN_LOCK_DURATION_MINUTES
        value: "30"
